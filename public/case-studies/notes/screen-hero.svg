<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Notes composer with contextual identity picker</title>
  <desc id="desc">A stylized product screen showing a Notes composer and company or designation identity options.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F1D6"/>
      <stop offset="1" stop-color="#E6F7FF"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="800" fill="url(#surface)"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="98" y="78" width="1404" height="644" rx="40" fill="#FFFFFF" opacity="0.72"/>
    <rect x="154" y="136" width="370" height="528" rx="34" fill="#111111" filter="url(#panelShadow)"/>
    <rect x="184" y="176" width="310" height="448" rx="28" fill="#FFF36B"/>
    <text x="220" y="250" font-size="38" font-weight="900" fill="#111111">The meeting</text>
    <text x="220" y="304" font-size="38" font-weight="900" fill="#111111">was messy,</text>
    <text x="220" y="358" font-size="38" font-weight="900" fill="#111111">but the follow</text>
    <text x="220" y="412" font-size="38" font-weight="900" fill="#111111">up doc was</text>
    <text x="220" y="466" font-size="38" font-weight="900" fill="#111111">actually useful.</text>
    <rect x="220" y="534" width="198" height="38" rx="19" fill="#111111" opacity="0.12"/>
    <text x="252" y="559" font-size="15" font-weight="800" fill="#111111" opacity="0.62">24 hours</text>
    <text x="608" y="172" font-size="18" font-weight="800" letter-spacing="3.5" fill="#111111" opacity="0.45">COMPOSER</text>
    <text x="608" y="242" font-size="56" font-weight="900" fill="#111111">Share a work moment</text>
    <text x="612" y="286" font-size="24" fill="#111111" opacity="0.58">A note is temporary, visual, and lightweight enough for the things that do not need a permanent post.</text>
    <rect x="608" y="348" width="762" height="82" rx="24" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.12"/>
    <text x="640" y="382" font-size="16" font-weight="800" letter-spacing="2" fill="#111111" opacity="0.45">CHOOSE IDENTITY</text>
    <text x="640" y="410" font-size="20" font-weight="800" fill="#111111">Company</text>
    <text x="844" y="410" font-size="20" font-weight="700" fill="#111111" opacity="0.5">Designation</text>
    <rect x="620" y="444" width="320" height="122" rx="28" fill="#121212"/>
    <text x="654" y="486" font-size="22" font-weight="900" fill="#FFFFFF">AmbitionBox</text>
    <text x="654" y="520" font-size="17" fill="#FFFFFF" opacity="0.62">Best for company-specific stories</text>
    <rect x="978" y="444" width="320" height="122" rx="28" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.12"/>
    <text x="1012" y="486" font-size="22" font-weight="900" fill="#111111">Product Designer</text>
    <text x="1012" y="520" font-size="17" fill="#111111" opacity="0.56">Best for role-specific moments</text>
    <rect x="608" y="604" width="214" height="58" rx="29" fill="#111111"/>
    <text x="660" y="641" font-size="18" font-weight="900" fill="#FFFFFF">Publish note</text>
    <text x="854" y="641" font-size="18" font-weight="800" fill="#111111" opacity="0.45">Saved as a 24-hour format</text>
  </g>
</svg>
