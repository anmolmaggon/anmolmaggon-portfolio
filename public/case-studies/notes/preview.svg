<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" role="img" aria-labelledby="title desc">
  <title id="title">Notes case study preview</title>
  <desc id="desc">A stylized preview of ephemeral workplace notes in a community feed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8D8"/>
      <stop offset="0.48" stop-color="#FFDFA8"/>
      <stop offset="1" stop-color="#C7E9FF"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202124"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#1A1A1A" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1000" height="800" rx="42" fill="url(#bg)"/>
  <circle cx="846" cy="102" r="130" fill="#FF6F91" opacity="0.22"/>
  <circle cx="126" cy="662" r="178" fill="#5ED6A8" opacity="0.25"/>
  <g filter="url(#softShadow)">
    <rect x="238" y="78" width="524" height="644" rx="52" fill="url(#phone)"/>
    <rect x="268" y="116" width="464" height="568" rx="36" fill="#F7F5EC"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="310" y="174" font-size="24" font-weight="700" fill="#121212">Communities</text>
    <text x="310" y="210" font-size="13" font-weight="700" letter-spacing="2.5" fill="#121212" opacity="0.46">NOTES</text>
    <rect x="310" y="238" width="380" height="104" rx="24" fill="#FFFFFF"/>
    <circle cx="350" cy="290" r="24" fill="#111111"/>
    <text x="386" y="284" font-size="18" font-weight="700" fill="#111111">How was work today?</text>
    <text x="386" y="310" font-size="14" fill="#111111" opacity="0.55">Share for 24 hours</text>
    <g transform="translate(310 384) rotate(-5)">
      <rect width="170" height="182" rx="22" fill="#FFE268"/>
      <rect x="18" y="18" width="62" height="14" rx="7" fill="#111111" opacity="0.16"/>
      <text x="18" y="67" font-size="18" font-weight="800" fill="#111111">The team</text>
      <text x="18" y="94" font-size="18" font-weight="800" fill="#111111">finally fixed</text>
      <text x="18" y="121" font-size="18" font-weight="800" fill="#111111">standups.</text>
      <rect x="18" y="146" width="82" height="22" rx="11" fill="#111111" opacity="0.12"/>
    </g>
    <g transform="translate(500 360) rotate(4)">
      <rect width="170" height="210" rx="22" fill="#FF8FAB"/>
      <rect x="18" y="18" width="52" height="14" rx="7" fill="#111111" opacity="0.18"/>
      <text x="18" y="69" font-size="18" font-weight="800" fill="#111111">Tiny win:</text>
      <text x="18" y="96" font-size="18" font-weight="800" fill="#111111">manager</text>
      <text x="18" y="123" font-size="18" font-weight="800" fill="#111111">actually</text>
      <text x="18" y="150" font-size="18" font-weight="800" fill="#111111">listened.</text>
      <circle cx="132" cy="172" r="15" fill="#111111" opacity="0.16"/>
    </g>
    <g transform="translate(402 532) rotate(-2)">
      <rect width="190" height="96" rx="24" fill="#AEE8FF"/>
      <text x="20" y="42" font-size="17" font-weight="800" fill="#111111">Company view</text>
      <text x="20" y="68" font-size="14" fill="#111111" opacity="0.6">Visible today only</text>
    </g>
  </g>
</svg>
