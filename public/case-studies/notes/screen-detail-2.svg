<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Author reaction stats for a Note</title>
  <desc id="desc">A stylized product screen showing an author-facing reaction summary for a temporary note.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9EFCB"/>
      <stop offset="1" stop-color="#D5F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity="0.17"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="172" y="104" width="856" height="652" rx="42" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="236" y="184" font-size="18" font-weight="900" letter-spacing="3" fill="#111111" opacity="0.42">AUTHOR VIEW</text>
    <text x="236" y="248" font-size="50" font-weight="900" fill="#111111">Reaction stats</text>
    <text x="238" y="292" font-size="22" fill="#111111" opacity="0.58">A temporary note gives one clear audience signal, without turning into a comment thread.</text>
    <rect x="236" y="354" width="270" height="278" rx="32" fill="#FFF16E"/>
    <text x="270" y="420" font-size="28" font-weight="900" fill="#111111">That design</text>
    <text x="270" y="458" font-size="28" font-weight="900" fill="#111111">review could</text>
    <text x="270" y="496" font-size="28" font-weight="900" fill="#111111">have been</text>
    <text x="270" y="534" font-size="28" font-weight="900" fill="#111111">a doc.</text>
    <rect x="270" y="574" width="138" height="26" rx="13" fill="#111111" opacity="0.13"/>
    <rect x="568" y="354" width="336" height="64" rx="22" fill="#111111"/>
    <text x="596" y="394" font-size="20" font-weight="900" fill="#FFFFFF">42 total reactions</text>
    <g transform="translate(568 456)">
      <circle cx="30" cy="30" r="30" fill="#FF7A9A"/>
      <text x="82" y="25" font-size="19" font-weight="900" fill="#111111">Relatable</text>
      <text x="82" y="54" font-size="17" fill="#111111" opacity="0.56">18 people</text>
      <rect x="214" y="14" width="90" height="32" rx="16" fill="#111111" opacity="0.08"/>
      <text x="245" y="36" font-size="16" font-weight="900" fill="#111111">43%</text>
    </g>
    <g transform="translate(568 544)">
      <circle cx="30" cy="30" r="30" fill="#6AD9FF"/>
      <text x="82" y="25" font-size="19" font-weight="900" fill="#111111">Useful</text>
      <text x="82" y="54" font-size="17" fill="#111111" opacity="0.56">14 people</text>
      <rect x="214" y="14" width="90" height="32" rx="16" fill="#111111" opacity="0.08"/>
      <text x="245" y="36" font-size="16" font-weight="900" fill="#111111">33%</text>
    </g>
    <g transform="translate(568 632)">
      <circle cx="30" cy="30" r="30" fill="#A8EF8E"/>
      <text x="82" y="25" font-size="19" font-weight="900" fill="#111111">Needed this</text>
      <text x="82" y="54" font-size="17" fill="#111111" opacity="0.56">10 people</text>
      <rect x="214" y="14" width="90" height="32" rx="16" fill="#111111" opacity="0.08"/>
      <text x="245" y="36" font-size="16" font-weight="900" fill="#111111">24%</text>
    </g>
  </g>
</svg>
