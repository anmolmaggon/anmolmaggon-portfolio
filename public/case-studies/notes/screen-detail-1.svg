<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Dense text and media inside a Notes viewer</title>
  <desc id="desc">A stylized product screen showing a dense note with text, image, sticker, and music within a story-like shell.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B1C20"/>
      <stop offset="1" stop-color="#34504F"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE76A"/>
      <stop offset="1" stop-color="#FF9F7E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="30" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="374" y="58" width="452" height="784" rx="56" fill="#090A0B"/>
    <rect x="408" y="104" width="384" height="692" rx="38" fill="#17181A"/>
    <rect x="438" y="136" width="324" height="6" rx="3" fill="#FFFFFF" opacity="0.28"/>
    <circle cx="462" cy="178" r="24" fill="#F6F1E1"/>
    <text x="500" y="172" font-size="17" font-weight="900" fill="#FFFFFF">Senior Analyst</text>
    <text x="500" y="196" font-size="13" fill="#FFFFFF" opacity="0.52">at a consulting company</text>
    <rect x="446" y="232" width="308" height="344" rx="30" fill="url(#card)"/>
    <text x="478" y="288" font-size="28" font-weight="900" fill="#121212">Most useful thing</text>
    <text x="478" y="328" font-size="28" font-weight="900" fill="#121212">today was a</text>
    <text x="478" y="368" font-size="28" font-weight="900" fill="#121212">half-written deck</text>
    <text x="478" y="408" font-size="28" font-weight="900" fill="#121212">that made everyone</text>
    <text x="478" y="448" font-size="28" font-weight="900" fill="#121212">say what they</text>
    <text x="478" y="488" font-size="28" font-weight="900" fill="#121212">actually meant.</text>
    <rect x="484" y="522" width="104" height="26" rx="13" fill="#111111" opacity="0.13"/>
    <rect x="438" y="608" width="150" height="118" rx="24" fill="#A9F3FF"/>
    <rect x="608" y="608" width="154" height="118" rx="24" fill="#C9FFB1"/>
    <path d="M474 684 L514 640 L552 684 Z" fill="#111111" opacity="0.18"/>
    <circle cx="546" cy="644" r="12" fill="#111111" opacity="0.18"/>
    <rect x="632" y="646" width="88" height="10" rx="5" fill="#111111" opacity="0.16"/>
    <rect x="632" y="670" width="64" height="10" rx="5" fill="#111111" opacity="0.16"/>
    <rect x="438" y="748" width="324" height="1" fill="#FFFFFF" opacity="0.12"/>
    <text x="438" y="778" font-size="14" font-weight="800" fill="#FFFFFF" opacity="0.62">One reaction only</text>
  </g>
  <text x="70" y="804" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="3" fill="#FFFFFF" opacity="0.45">IMMERSIVE VIEWER</text>
</svg>
