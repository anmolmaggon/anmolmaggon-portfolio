<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Notes case study cover</title>
  <desc id="desc">A stylized cover image showing the Notes viewing experience.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101114"/>
      <stop offset="0.58" stop-color="#2B1B3D"/>
      <stop offset="1" stop-color="#175B5B"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF06A"/>
      <stop offset="1" stop-color="#FFA85A"/>
    </linearGradient>
    <linearGradient id="media" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#75E7FF"/>
      <stop offset="1" stop-color="#88FFB0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="38" stdDeviation="34" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#wall)"/>
  <circle cx="1300" cy="146" r="190" fill="#FF7098" opacity="0.18"/>
  <circle cx="235" cy="760" r="250" fill="#52D7FF" opacity="0.15"/>
  <g filter="url(#shadow)">
    <rect x="500" y="72" width="600" height="756" rx="64" fill="#090A0B"/>
    <rect x="540" y="116" width="520" height="668" rx="42" fill="#18191B"/>
    <rect x="582" y="158" width="436" height="8" rx="4" fill="#F7F3E8" opacity="0.28"/>
    <rect x="582" y="188" width="88" height="88" rx="28" fill="#F7F3E8"/>
    <text x="698" y="222" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">Product designer</text>
    <text x="698" y="254" font-family="Inter, Arial, sans-serif" font-size="17" fill="#FFFFFF" opacity="0.55">at a fintech company</text>
    <rect x="616" y="328" width="368" height="298" rx="34" fill="url(#note)"/>
    <text x="660" y="400" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#111111">Today I learned</text>
    <text x="660" y="452" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#111111">that silence in</text>
    <text x="660" y="504" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#111111">review meetings</text>
    <text x="660" y="556" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#111111">is its own data.</text>
    <rect x="642" y="650" width="316" height="72" rx="24" fill="url(#media)"/>
    <circle cx="688" cy="686" r="18" fill="#111111" opacity="0.2"/>
    <rect x="730" y="675" width="172" height="20" rx="10" fill="#111111" opacity="0.2"/>
    <rect x="582" y="738" width="436" height="1" fill="#FFFFFF" opacity="0.12"/>
    <text x="582" y="768" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" opacity="0.65">Reply hidden. React once.</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF">
    <text x="104" y="150" font-size="20" font-weight="800" letter-spacing="4" opacity="0.55">CASE STUDY 01</text>
    <text x="104" y="240" font-size="92" font-weight="900">Notes</text>
    <text x="108" y="294" font-size="30" opacity="0.68">24-hour workplace expression for AmbitionBox Communities</text>
  </g>
</svg>
